<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E56A0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" rx="16" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#0F172A" letter-spacing="0.12em" font-family="system-ui, sans-serif">THE EVOLUTION OF PRESENTATIONS</text>

  <!-- ============ PANEL 1: ANCIENT (PPT) ============ -->
  <g transform="translate(20, 58)">
    <rect width="370" height="415" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Era label -->
    <rect x="65" y="14" width="240" height="32" rx="16" fill="#DC2626"/>
    <text x="185" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.06em" font-family="system-ui, sans-serif">2005 &#x2014; THE DARK AGE</text>

    <!-- Desk -->
    <rect x="60" y="265" width="250" height="10" rx="3" fill="#CBD5E1"/>
    <rect x="80" y="275" width="8" height="55" fill="#CBD5E1"/>
    <rect x="282" y="275" width="8" height="55" fill="#CBD5E1"/>

    <!-- Old monitor -->
    <rect x="120" y="172" width="130" height="90" rx="8" fill="#94A3B8"/>
    <rect x="126" y="178" width="118" height="72" rx="4" fill="#1E293B"/>
    <!-- PPT on screen -->
    <rect x="134" y="186" width="102" height="56" rx="2" fill="#D97706" opacity="0.25"/>
    <text x="185" y="207" text-anchor="middle" font-size="8" fill="#F59E0B" font-weight="600" font-family="system-ui, sans-serif">SLIDE 14 OF 47</text>
    <!-- Misaligned boxes -->
    <rect x="140" y="214" width="30" height="7" rx="1" fill="#EF4444" opacity="0.5" transform="rotate(2 155 217)"/>
    <rect x="175" y="216" width="25" height="7" rx="1" fill="#3B82F6" opacity="0.5" transform="rotate(-1 187 219)"/>
    <rect x="205" y="213" width="28" height="7" rx="1" fill="#10B981" opacity="0.5" transform="rotate(3 219 216)"/>
    <!-- Monitor stand -->
    <rect x="170" y="256" width="30" height="10" rx="3" fill="#94A3B8"/>

    <!-- Person (sad) -->
    <circle cx="185" cy="142" r="24" fill="#FBBF24"/>
    <!-- Tired eyes -->
    <ellipse cx="176" cy="139" rx="3" ry="2.5" fill="#1E293B"/>
    <ellipse cx="194" cy="139" rx="3" ry="2.5" fill="#1E293B"/>
    <!-- Frown -->
    <path d="M175 152 Q185 146 195 152" stroke="#1E293B" stroke-width="2" fill="none"/>
    <!-- Sweat drop -->
    <ellipse cx="210" cy="133" rx="3" ry="5" fill="#60A5FA" opacity="0.6"/>
    <!-- Body -->
    <rect x="170" y="166" width="30" height="38" rx="8" fill="#94A3B8"/>
    <!-- Arms -->
    <rect x="140" y="178" width="35" height="8" rx="4" fill="#94A3B8" transform="rotate(12 157 182)"/>
    <rect x="195" y="178" width="35" height="8" rx="4" fill="#94A3B8" transform="rotate(-12 212 182)"/>

    <!-- Speech bubble -->
    <rect x="228" y="95" width="130" height="58" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <polygon points="233,148 243,155 250,145" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <text x="293" y="116" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="600" font-family="system-ui, sans-serif">"Why won't these</text>
    <text x="293" y="130" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="600" font-family="system-ui, sans-serif">boxes align?!"</text>
    <text x="293" y="145" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="700" font-family="system-ui, sans-serif">4 hours later...</text>

    <!-- Clock -->
    <circle cx="52" cy="108" r="20" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
    <text x="52" y="113" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700" font-family="system-ui, sans-serif">3 AM</text>

    <!-- Coffee cups -->
    <rect x="68" y="248" width="14" height="17" rx="2" fill="#92400E"/>
    <rect x="66" y="245" width="18" height="5" rx="2" fill="#A16207"/>
    <rect x="92" y="251" width="12" height="14" rx="2" fill="#92400E"/>
    <rect x="90" y="248" width="16" height="5" rx="2" fill="#A16207"/>

    <!-- Bottom label -->
    <text x="185" y="358" text-anchor="middle" font-size="16" font-weight="800" fill="#DC2626" font-family="system-ui, sans-serif">Manually Making PPT</text>
    <text x="185" y="378" text-anchor="middle" font-size="11" fill="#64748B" font-family="system-ui, sans-serif">47 slides. 4 hours. 3 coffees.</text>
    <text x="185" y="395" text-anchor="middle" font-size="11" fill="#64748B" font-family="system-ui, sans-serif">Still looks terrible.</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(393, 260)">
    <path d="M0 0 L20 0 L15 -6 M20 0 L15 6" stroke="#94A3B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============ PANEL 2: MODERN (AI + PPT) ============ -->
  <g transform="translate(415, 58)">
    <rect width="370" height="415" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Era label -->
    <rect x="65" y="14" width="240" height="32" rx="16" fill="#F59E0B"/>
    <text x="185" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B" letter-spacing="0.06em" font-family="system-ui, sans-serif">2025 &#x2014; AI ERA... BUT</text>

    <!-- AI Robot -->
    <rect x="85" y="118" width="55" height="55" rx="14" fill="#8B5CF6"/>
    <circle cx="101" cy="140" r="6" fill="#fff"/>
    <circle cx="121" cy="140" r="6" fill="#fff"/>
    <circle cx="101" cy="140" r="2.5" fill="#1E293B"/>
    <circle cx="121" cy="140" r="2.5" fill="#1E293B"/>
    <rect x="99" y="153" width="24" height="4" rx="2" fill="#fff"/>
    <!-- Antenna -->
    <line x1="112" y1="118" x2="112" y2="105" stroke="#A78BFA" stroke-width="2"/>
    <circle cx="112" cy="102" r="4" fill="#A78BFA"/>
    <!-- Sparkles -->
    <text x="75" y="112" font-size="14" font-family="system-ui, sans-serif">&#x2728;</text>
    <text x="143" y="122" font-size="11" font-family="system-ui, sans-serif">&#x2728;</text>

    <!-- Arrow to PPT -->
    <line x1="150" y1="145" x2="188" y2="145" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="188,140 198,145 188,150" fill="#8B5CF6"/>

    <!-- PPT file -->
    <rect x="202" y="116" width="65" height="58" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="234" y="140" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700" font-family="system-ui, sans-serif">.pptx</text>
    <text x="234" y="155" text-anchor="middle" font-size="7" fill="#A16207" font-family="system-ui, sans-serif">48 slides &#xB7; 12 MB</text>

    <!-- Confused person -->
    <circle cx="305" cy="135" r="24" fill="#FBBF24"/>
    <ellipse cx="296" cy="132" rx="3" ry="2.5" fill="#1E293B"/>
    <ellipse cx="314" cy="132" rx="3" ry="2.5" fill="#1E293B"/>
    <path d="M294 147 Q300 152 306 146 Q312 152 318 147" stroke="#1E293B" stroke-width="2" fill="none"/>
    <text x="332" y="125" font-size="22" fill="#F59E0B" font-weight="800" font-family="system-ui, sans-serif">?</text>
    <rect x="290" y="159" width="30" height="38" rx="8" fill="#94A3B8"/>

    <!-- Speech bubble -->
    <rect x="205" y="195" width="150" height="60" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <polygon points="295,190 300,195 288,195" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="280" y="215" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="600" font-family="system-ui, sans-serif">"AI made slides...</text>
    <text x="280" y="229" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="600" font-family="system-ui, sans-serif">but they're still</text>
    <text x="280" y="245" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="700" font-family="system-ui, sans-serif">boring slides."</text>

    <!-- Boring slide mockup -->
    <rect x="40" y="200" width="150" height="80" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="50" y="218" font-size="8" fill="#94A3B8" font-weight="600" font-family="system-ui, sans-serif">&#x2022; Bullet point one</text>
    <text x="50" y="232" font-size="8" fill="#94A3B8" font-weight="600" font-family="system-ui, sans-serif">&#x2022; Bullet point two</text>
    <text x="50" y="246" font-size="8" fill="#94A3B8" font-weight="600" font-family="system-ui, sans-serif">&#x2022; Bullet point three</text>
    <text x="50" y="260" font-size="8" fill="#94A3B8" font-weight="600" font-family="system-ui, sans-serif">&#x2022; Bullet point four</text>
    <text x="50" y="274" font-size="8" fill="#CBD5E1" font-weight="600" font-family="system-ui, sans-serif">&#x2022; zzzzzzzzz</text>

    <!-- Bottom label -->
    <text x="185" y="345" text-anchor="middle" font-size="16" font-weight="800" fill="#D97706" font-family="system-ui, sans-serif">AI Generates... PPT?</text>
    <text x="185" y="365" text-anchor="middle" font-size="11" fill="#64748B" font-family="system-ui, sans-serif">Using a Ferrari to pull a horse cart.</text>
    <text x="185" y="382" text-anchor="middle" font-size="11" fill="#64748B" font-family="system-ui, sans-serif">AI writes XML &#x2192; PowerPoint renders boxes.</text>
    <text x="185" y="399" text-anchor="middle" font-size="11" fill="#64748B" font-weight="600" font-family="system-ui, sans-serif">Why?</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(788, 260)">
    <path d="M0 0 L20 0 L15 -6 M20 0 L15 6" stroke="#94A3B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============ PANEL 3: FUTURE (AI + HTML) ============ -->
  <g transform="translate(810, 58)">
    <rect width="370" height="415" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#10B981" stroke-width="2"/>

    <!-- Era label -->
    <rect x="55" y="14" width="260" height="32" rx="16" fill="#10B981"/>
    <text x="185" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.06em" font-family="system-ui, sans-serif">2026 &#x2014; THE GG MOMENT</text>

    <!-- AI (bigger, happier) -->
    <rect x="35" y="112" width="58" height="58" rx="16" fill="#8B5CF6"/>
    <circle cx="52" cy="136" r="7" fill="#fff"/>
    <circle cx="72" cy="136" r="7" fill="#fff"/>
    <circle cx="52" cy="136" r="3" fill="#1E293B"/>
    <circle cx="72" cy="136" r="3" fill="#1E293B"/>
    <path d="M50 150 Q62 158 74 150" stroke="#fff" stroke-width="2" fill="none"/>
    <line x1="62" y1="112" x2="62" y2="98" stroke="#A78BFA" stroke-width="2"/>
    <circle cx="62" cy="95" r="5" fill="#A78BFA"/>
    <text x="25" y="102" font-size="14" font-family="system-ui, sans-serif">&#x2728;</text>
    <text x="95" y="108" font-size="12" font-family="system-ui, sans-serif">&#x2728;</text>

    <!-- Arrow -->
    <line x1="103" y1="141" x2="138" y2="141" stroke="#10B981" stroke-width="3"/>
    <polygon points="138,135 151,141 138,147" fill="#10B981"/>

    <!-- Browser window -->
    <rect x="155" y="82" width="200" height="140" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <!-- Browser chrome -->
    <rect x="155" y="82" width="200" height="22" rx="10" fill="#F1F5F9"/>
    <rect x="155" y="94" width="200" height="10" fill="#F1F5F9"/>
    <circle cx="170" cy="93" r="3.5" fill="#EF4444" opacity="0.6"/>
    <circle cx="181" cy="93" r="3.5" fill="#F59E0B" opacity="0.6"/>
    <circle cx="192" cy="93" r="3.5" fill="#10B981" opacity="0.6"/>
    <rect x="205" y="88" width="100" height="10" rx="5" fill="#E2E8F0"/>
    <text x="255" y="96" text-anchor="middle" font-size="5.5" fill="#64748B" font-family="system-ui, sans-serif">presentation.html</text>

    <!-- Hero section in browser -->
    <rect x="160" y="107" width="190" height="32" rx="3" fill="url(#heroGrad)"/>
    <text x="255" y="127" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui, sans-serif">Q3 Business Review</text>

    <!-- Stats cards -->
    <rect x="163" y="143" width="58" height="28" rx="4" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
    <rect x="225" y="143" width="58" height="28" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.5"/>
    <rect x="287" y="143" width="58" height="28" rx="4" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
    <text x="192" y="156" text-anchor="middle" font-size="10" fill="#10B981" font-weight="700" font-family="system-ui, sans-serif">98%</text>
    <text x="192" y="166" text-anchor="middle" font-size="5" fill="#64748B" font-family="system-ui, sans-serif">Satisfaction</text>
    <text x="254" y="156" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="700" font-family="system-ui, sans-serif">$52M</text>
    <text x="254" y="166" text-anchor="middle" font-size="5" fill="#64748B" font-family="system-ui, sans-serif">Revenue</text>
    <text x="316" y="156" text-anchor="middle" font-size="10" fill="#D97706" font-weight="700" font-family="system-ui, sans-serif">+42</text>
    <text x="316" y="166" text-anchor="middle" font-size="5" fill="#64748B" font-family="system-ui, sans-serif">Customers</text>

    <!-- Bar chart -->
    <rect x="163" y="176" width="88" height="38" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <rect x="170" y="201" width="10" height="9" rx="1.5" fill="#3B82F6" opacity="0.5"/>
    <rect x="183" y="196" width="10" height="14" rx="1.5" fill="#3B82F6" opacity="0.6"/>
    <rect x="196" y="191" width="10" height="19" rx="1.5" fill="#3B82F6" opacity="0.7"/>
    <rect x="209" y="185" width="10" height="25" rx="1.5" fill="#3B82F6" opacity="0.85"/>
    <rect x="222" y="179" width="10" height="31" rx="1.5" fill="#10B981"/>

    <!-- Donut chart -->
    <circle cx="310" cy="195" r="16" fill="none" stroke="#1E56A0" stroke-width="7" stroke-dasharray="60 100" transform="rotate(-90 310 195)"/>
    <circle cx="310" cy="195" r="16" fill="none" stroke="#F59E0B" stroke-width="7" stroke-dasharray="25 100" stroke-dashoffset="-60" transform="rotate(-90 310 195)"/>
    <circle cx="310" cy="195" r="16" fill="none" stroke="#8B5CF6" stroke-width="7" stroke-dasharray="15 100" stroke-dashoffset="-85" transform="rotate(-90 310 195)"/>

    <!-- Happy person -->
    <circle cx="78" cy="240" r="24" fill="#FBBF24"/>
    <path d="M67 237 Q71 232 75 237" stroke="#1E293B" stroke-width="2" fill="none"/>
    <path d="M81 237 Q85 232 89 237" stroke="#1E293B" stroke-width="2" fill="none"/>
    <path d="M67 249 Q78 260 89 249" stroke="#1E293B" stroke-width="2.5" fill="none"/>
    <!-- Body -->
    <rect x="63" y="264" width="30" height="38" rx="8" fill="#94A3B8"/>
    <!-- Arms raised -->
    <rect x="38" y="250" width="30" height="8" rx="4" fill="#94A3B8" transform="rotate(-35 53 254)"/>
    <rect x="88" y="250" width="30" height="8" rx="4" fill="#94A3B8" transform="rotate(35 103 254)"/>
    <!-- Celebration -->
    <text x="28" y="235" font-size="16" font-family="system-ui, sans-serif">&#x2728;</text>
    <text x="108" y="242" font-size="13" font-family="system-ui, sans-serif">&#x2728;</text>

    <!-- Speech bubble -->
    <rect x="120" y="232" width="150" height="58" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <polygon points="118,260 108,265 118,270" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="195" y="253" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="600" font-family="system-ui, sans-serif">"30 seconds. Interactive.</text>
    <text x="195" y="267" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="600" font-family="system-ui, sans-serif">Works everywhere.</text>
    <text x="195" y="282" text-anchor="middle" font-size="12" fill="#10B981" font-weight="800" font-family="system-ui, sans-serif">GG."</text>

    <!-- File badge -->
    <rect x="120" y="300" width="150" height="26" rx="13" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="195" y="317" text-anchor="middle" font-size="9" fill="#059669" font-weight="600" font-family="system-ui, sans-serif">1 file &#xB7; 142 KB &#xB7; any browser</text>

    <!-- Bottom label -->
    <text x="185" y="358" text-anchor="middle" font-size="16" font-weight="800" fill="#059669" font-family="system-ui, sans-serif">AI Generates HTML</text>
    <text x="185" y="378" text-anchor="middle" font-size="11" fill="#64748B" font-family="system-ui, sans-serif">Prompt in, webpage out.</text>
    <text x="185" y="395" text-anchor="middle" font-size="11" fill="#64748B" font-family="system-ui, sans-serif">Scroll, click, explore. No PPT. No suffering.</text>
  </g>

  <!-- Bottom tagline -->
  <rect x="330" y="486" width="540" height="26" rx="13" fill="#0F172A"/>
  <text x="600" y="503" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em" font-family="system-ui, sans-serif">GG-PPT: Stop generating slides. Generate web pages.</text>
</svg>
