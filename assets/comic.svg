<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" rx="16" fill="#0F172A"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="18" font-weight="800" fill="#F59E0B" letter-spacing="0.15em">THE EVOLUTION OF PRESENTATIONS</text>

  <!-- ============ PANEL 1: ANCIENT (PPT) ============ -->
  <g transform="translate(20, 62)">
    <!-- Panel bg -->
    <rect width="370" height="410" rx="12" fill="#1E293B"/>

    <!-- Era label -->
    <rect x="110" y="12" width="150" height="28" rx="14" fill="#DC2626" opacity="0.9"/>
    <text x="185" y="31" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" letter-spacing="0.08em">2005 — THE DARK AGE</text>

    <!-- Sad person at desk -->
    <!-- Desk -->
    <rect x="60" y="260" width="250" height="12" rx="3" fill="#475569"/>
    <rect x="80" y="272" width="8" height="60" fill="#475569"/>
    <rect x="282" y="272" width="8" height="60" fill="#475569"/>

    <!-- Old monitor -->
    <rect x="120" y="170" width="130" height="90" rx="6" fill="#334155"/>
    <rect x="126" y="176" width="118" height="72" rx="3" fill="#1a1a2e"/>
    <!-- PPT on screen -->
    <rect x="134" y="184" width="102" height="56" rx="2" fill="#D97706" opacity="0.3"/>
    <text x="185" y="206" text-anchor="middle" font-size="8" fill="#F59E0B" font-weight="600">SLIDE 14 OF 47</text>
    <!-- Tiny misaligned boxes on screen -->
    <rect x="140" y="212" width="30" height="8" rx="1" fill="#EF4444" opacity="0.5" transform="rotate(2 155 216)"/>
    <rect x="175" y="214" width="25" height="8" rx="1" fill="#3B82F6" opacity="0.5" transform="rotate(-1 187 218)"/>
    <rect x="205" y="211" width="28" height="8" rx="1" fill="#10B981" opacity="0.5" transform="rotate(3 219 215)"/>
    <text x="185" y="235" text-anchor="middle" font-size="6" fill="#64748B">● ● ● ● ● ● ● ● ● ● ●</text>
    <!-- Monitor stand -->
    <rect x="170" y="254" width="30" height="8" rx="2" fill="#475569"/>

    <!-- Person (sad) -->
    <!-- Head -->
    <circle cx="185" cy="140" r="22" fill="#FBBF24" opacity="0.9"/>
    <!-- Tired eyes (droopy) -->
    <ellipse cx="177" cy="137" rx="3" ry="2.5" fill="#1E293B"/>
    <ellipse cx="193" cy="137" rx="3" ry="2.5" fill="#1E293B"/>
    <!-- Frown -->
    <path d="M175 149 Q185 143 195 149" stroke="#1E293B" stroke-width="2" fill="none"/>
    <!-- Sweat drop -->
    <ellipse cx="208" cy="132" rx="3" ry="5" fill="#60A5FA" opacity="0.7"/>
    <!-- Body -->
    <rect x="170" y="162" width="30" height="40" rx="8" fill="#64748B"/>
    <!-- Arms reaching toward keyboard -->
    <rect x="140" y="175" width="35" height="8" rx="4" fill="#64748B" transform="rotate(15 157 179)"/>
    <rect x="195" y="175" width="35" height="8" rx="4" fill="#64748B" transform="rotate(-15 212 179)"/>

    <!-- Speech bubble -->
    <rect x="230" y="100" width="125" height="55" rx="10" fill="#fff" filter="url(#shadow)"/>
    <polygon points="235,150 245,155 250,145" fill="#fff"/>
    <text x="292" y="120" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="600">"Why won't these</text>
    <text x="292" y="133" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="600">boxes align?!"</text>
    <text x="292" y="146" text-anchor="middle" font-size="8" fill="#EF4444" font-weight="700">4 hours later...</text>

    <!-- Clock showing late -->
    <circle cx="55" cy="110" r="18" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="55" y="115" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="700">3 AM</text>

    <!-- Coffee cups -->
    <rect x="70" y="244" width="14" height="16" rx="2" fill="#78350F"/>
    <rect x="68" y="241" width="18" height="5" rx="2" fill="#92400E"/>
    <rect x="95" y="247" width="12" height="13" rx="2" fill="#78350F"/>
    <rect x="93" y="244" width="16" height="5" rx="2" fill="#92400E"/>

    <!-- Bottom label -->
    <text x="185" y="360" text-anchor="middle" font-size="15" font-weight="800" fill="#EF4444">Manually Making PPT</text>
    <text x="185" y="380" text-anchor="middle" font-size="10" fill="#94A3B8">47 slides. 4 hours. 3 coffees.</text>
    <text x="185" y="395" text-anchor="middle" font-size="10" fill="#94A3B8">Still looks like garbage.</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(395, 240)">
    <text x="12" y="0" font-size="28" fill="#475569">&#x2192;</text>
  </g>

  <!-- ============ PANEL 2: MODERN (AI + PPT) ============ -->
  <g transform="translate(415, 62)">
    <rect width="370" height="410" rx="12" fill="#1E293B"/>

    <!-- Era label -->
    <rect x="110" y="12" width="150" height="28" rx="14" fill="#F59E0B" opacity="0.9"/>
    <text x="185" y="31" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B" letter-spacing="0.08em">2025 — AI ERA... BUT</text>

    <!-- Person with robot -->
    <!-- Robot/AI icon -->
    <rect x="90" y="120" width="50" height="50" rx="12" fill="#8B5CF6"/>
    <circle cx="105" cy="140" r="5" fill="#fff"/>
    <circle cx="125" cy="140" r="5" fill="#fff"/>
    <circle cx="105" cy="140" r="2" fill="#1E293B"/>
    <circle cx="125" cy="140" r="2" fill="#1E293B"/>
    <rect x="102" y="152" width="26" height="4" rx="2" fill="#fff"/>
    <!-- Antenna -->
    <line x1="115" y1="120" x2="115" y2="108" stroke="#A78BFA" stroke-width="2"/>
    <circle cx="115" cy="105" r="4" fill="#A78BFA"/>
    <!-- Sparkles -->
    <text x="80" y="115" font-size="12" fill="#FBBF24">&#x2728;</text>
    <text x="145" y="125" font-size="10" fill="#FBBF24">&#x2728;</text>

    <!-- Arrow from AI to PPT -->
    <line x1="150" y1="145" x2="185" y2="145" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="185,140 195,145 185,150" fill="#8B5CF6"/>

    <!-- PPT file icon (output) -->
    <rect x="200" y="118" width="60" height="55" rx="6" fill="#D97706" opacity="0.8"/>
    <text x="230" y="140" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">.pptx</text>
    <text x="230" y="155" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">48 slides</text>
    <text x="230" y="165" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">12.4 MB</text>

    <!-- Confused person looking at it -->
    <circle cx="300" cy="135" r="22" fill="#FBBF24" opacity="0.9"/>
    <!-- Confused eyes -->
    <ellipse cx="292" cy="132" rx="3" ry="2.5" fill="#1E293B"/>
    <ellipse cx="308" cy="132" rx="3" ry="2.5" fill="#1E293B"/>
    <!-- Confused mouth -->
    <path d="M290 146 Q295 150 300 145 Q305 150 310 146" stroke="#1E293B" stroke-width="2" fill="none"/>
    <!-- Question mark -->
    <text x="325" y="125" font-size="20" fill="#F59E0B" font-weight="800">?</text>
    <!-- Body -->
    <rect x="285" y="157" width="30" height="40" rx="8" fill="#64748B"/>

    <!-- Speech bubble from person -->
    <rect x="235" y="195" width="130" height="60" rx="10" fill="#fff" filter="url(#shadow)"/>
    <polygon points="290,190 295,195 285,195" fill="#fff"/>
    <text x="300" y="213" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="600">"AI made slides...</text>
    <text x="300" y="226" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="600">but they're still</text>
    <text x="300" y="239" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="700">boring slides."</text>

    <!-- Thought: still same PPT problem -->
    <rect x="50" y="200" width="140" height="75" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
    <!-- Mockup of boring slide -->
    <text x="60" y="218" font-size="7" fill="#94A3B8" font-weight="600">&#x2022; Bullet point one</text>
    <text x="60" y="230" font-size="7" fill="#94A3B8" font-weight="600">&#x2022; Bullet point two</text>
    <text x="60" y="242" font-size="7" fill="#94A3B8" font-weight="600">&#x2022; Bullet point three</text>
    <text x="60" y="254" font-size="7" fill="#94A3B8" font-weight="600">&#x2022; Bullet point four</text>
    <text x="60" y="266" font-size="7" fill="#94A3B8" font-weight="600">&#x2022; zzzzzzzzz</text>

    <!-- Bottom label -->
    <text x="185" y="345" text-anchor="middle" font-size="15" font-weight="800" fill="#F59E0B">AI Generates... PPT?</text>
    <text x="185" y="365" text-anchor="middle" font-size="10" fill="#94A3B8">Using a Ferrari to pull a horse cart.</text>
    <text x="185" y="380" text-anchor="middle" font-size="10" fill="#94A3B8">AI writes XML → PowerPoint renders boxes.</text>
    <text x="185" y="395" text-anchor="middle" font-size="10" fill="#94A3B8">Why?</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(790, 240)">
    <text x="12" y="0" font-size="28" fill="#475569">&#x2192;</text>
  </g>

  <!-- ============ PANEL 3: FUTURE (AI → HTML) ============ -->
  <g transform="translate(810, 62)">
    <rect width="370" height="410" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2"/>

    <!-- Era label -->
    <rect x="95" y="12" width="180" height="28" rx="14" fill="#10B981"/>
    <text x="185" y="31" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" letter-spacing="0.08em">2026 — THE GG MOMENT</text>

    <!-- AI icon (bigger, happier) -->
    <rect x="40" y="115" width="55" height="55" rx="14" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="55" cy="137" r="6" fill="#fff"/>
    <circle cx="72" cy="137" r="6" fill="#fff"/>
    <circle cx="55" cy="137" r="2.5" fill="#1E293B"/>
    <circle cx="72" cy="137" r="2.5" fill="#1E293B"/>
    <path d="M53 152 Q63 158 73 152" stroke="#fff" stroke-width="2" fill="none"/>
    <line x1="63" y1="115" x2="63" y2="100" stroke="#A78BFA" stroke-width="2"/>
    <circle cx="63" cy="97" r="5" fill="#A78BFA"/>
    <text x="30" y="105" font-size="14" fill="#FBBF24">&#x2728;</text>
    <text x="92" y="110" font-size="12" fill="#FBBF24">&#x2728;</text>
    <text x="45" y="95" font-size="10" fill="#FBBF24">&#x2728;</text>

    <!-- Arrow from AI to HTML -->
    <line x1="105" y1="142" x2="135" y2="142" stroke="#10B981" stroke-width="3"/>
    <polygon points="135,136 148,142 135,148" fill="#10B981"/>

    <!-- Beautiful browser window -->
    <rect x="150" y="85" width="195" height="135" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5"/>
    <!-- Browser chrome -->
    <rect x="150" y="85" width="195" height="20" rx="8" fill="#1a2332"/>
    <circle cx="164" cy="95" r="3" fill="#EF4444" opacity="0.7"/>
    <circle cx="174" cy="95" r="3" fill="#F59E0B" opacity="0.7"/>
    <circle cx="184" cy="95" r="3" fill="#10B981" opacity="0.7"/>
    <rect x="195" y="90" width="100" height="10" rx="5" fill="#0F172A"/>
    <text x="245" y="98" text-anchor="middle" font-size="5" fill="#64748B">presentation.html</text>

    <!-- Content inside browser — mini webpage -->
    <!-- Hero section -->
    <rect x="155" y="108" width="185" height="30" rx="2" fill="linear-gradient(#1E3A5F, #0F172A)"/>
    <defs>
      <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0F172A"/>
        <stop offset="100%" stop-color="#1E56A0"/>
      </linearGradient>
    </defs>
    <rect x="155" y="108" width="185" height="30" rx="2" fill="url(#heroGrad)"/>
    <text x="247" y="125" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">Q3 Business Review</text>

    <!-- Cards section -->
    <rect x="158" y="141" width="55" height="25" rx="3" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <rect x="217" y="141" width="55" height="25" rx="3" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <rect x="276" y="141" width="55" height="25" rx="3" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <text x="185" y="153" text-anchor="middle" font-size="9" fill="#10B981" font-weight="700">98%</text>
    <text x="185" y="162" text-anchor="middle" font-size="4" fill="#94A3B8">Satisfaction</text>
    <text x="244" y="153" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="700">$52M</text>
    <text x="244" y="162" text-anchor="middle" font-size="4" fill="#94A3B8">Revenue</text>
    <text x="303" y="153" text-anchor="middle" font-size="9" fill="#F59E0B" font-weight="700">+42</text>
    <text x="303" y="162" text-anchor="middle" font-size="4" fill="#94A3B8">Customers</text>

    <!-- Chart section -->
    <rect x="158" y="170" width="85" height="40" rx="3" fill="#1E293B"/>
    <!-- Mini bar chart -->
    <rect x="165" y="196" width="10" height="10" rx="1" fill="#3B82F6" opacity="0.6"/>
    <rect x="178" y="191" width="10" height="15" rx="1" fill="#3B82F6" opacity="0.7"/>
    <rect x="191" y="185" width="10" height="21" rx="1" fill="#3B82F6" opacity="0.8"/>
    <rect x="204" y="179" width="10" height="27" rx="1" fill="#3B82F6" opacity="0.9"/>
    <rect x="217" y="173" width="10" height="33" rx="1" fill="#10B981"/>

    <!-- Mini donut -->
    <circle cx="290" cy="190" r="16" fill="none" stroke="#1E56A0" stroke-width="6" stroke-dasharray="60 100" transform="rotate(-90 290 190)"/>
    <circle cx="290" cy="190" r="16" fill="none" stroke="#F59E0B" stroke-width="6" stroke-dasharray="25 100" stroke-dashoffset="-60" transform="rotate(-90 290 190)"/>
    <circle cx="290" cy="190" r="16" fill="none" stroke="#8B5CF6" stroke-width="6" stroke-dasharray="15 100" stroke-dashoffset="-85" transform="rotate(-90 290 190)"/>

    <!-- Happy person -->
    <circle cx="80" cy="240" r="22" fill="#FBBF24" opacity="0.9"/>
    <!-- Happy eyes -->
    <path d="M70 237 Q73 233 76 237" stroke="#1E293B" stroke-width="2" fill="none"/>
    <path d="M84 237 Q87 233 90 237" stroke="#1E293B" stroke-width="2" fill="none"/>
    <!-- Big smile -->
    <path d="M70 248 Q80 258 90 248" stroke="#1E293B" stroke-width="2" fill="none"/>
    <!-- Sunglasses... actually let's keep happy eyes -->
    <!-- Body (arms up celebrating) -->
    <rect x="65" y="262" width="30" height="40" rx="8" fill="#64748B"/>
    <!-- Arms raised -->
    <rect x="42" y="248" width="30" height="8" rx="4" fill="#64748B" transform="rotate(-30 57 252)"/>
    <rect x="88" y="248" width="30" height="8" rx="4" fill="#64748B" transform="rotate(30 103 252)"/>
    <!-- Celebration sparkles -->
    <text x="35" y="235" font-size="14" fill="#FBBF24">&#x2728;</text>
    <text x="105" y="242" font-size="11" fill="#FBBF24">&#x2728;</text>

    <!-- Speech bubble -->
    <rect x="115" y="230" width="145" height="55" rx="10" fill="#fff" filter="url(#shadow)"/>
    <polygon points="115,260 105,265 115,270" fill="#fff"/>
    <text x="187" y="250" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="600">"30 seconds. Interactive.</text>
    <text x="187" y="263" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="600">Works everywhere.</text>
    <text x="187" y="276" text-anchor="middle" font-size="9" fill="#10B981" font-weight="800">GG."</text>

    <!-- File size comparison -->
    <rect x="135" y="295" width="120" height="30" rx="6" fill="#10B981" opacity="0.15"/>
    <text x="195" y="314" text-anchor="middle" font-size="9" fill="#10B981" font-weight="700">1 file &middot; 142 KB &middot; any browser</text>

    <!-- Bottom label -->
    <text x="185" y="355" text-anchor="middle" font-size="15" font-weight="800" fill="#10B981">AI Generates HTML</text>
    <text x="185" y="375" text-anchor="middle" font-size="10" fill="#94A3B8">Prompt in, webpage out. Scroll, click, explore.</text>
    <text x="185" y="390" text-anchor="middle" font-size="10" fill="#94A3B8">No PowerPoint. No installs. No suffering.</text>
  </g>

  <!-- Bottom tagline -->
  <rect x="350" y="485" width="500" height="28" rx="14" fill="#F59E0B"/>
  <text x="600" y="504" text-anchor="middle" font-size="14" font-weight="800" fill="#0F172A" letter-spacing="0.05em">GG-PPT: Stop generating slides. Generate web pages.</text>
</svg>
